<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTARUNE Chapter 5 Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}

body {
  font-family: "Press Start 2P", monospace;
  color: white;
  image-rendering: pixelated;
}

.page {
  position: relative;
  width: 100vw;
  height: 100vh;
  background:
    radial-gradient(circle at center, rgba(65, 65, 65, 0.18) 0%, transparent 42%),
    repeating-linear-gradient(
      45deg,
      #050505 0px,
      #050505 8px,
      #080808 8px,
      #080808 16px
    );
  display: flex;
  align-items: center;
  justify-content: center;
}

.page::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 2px);
  background-size: 42px 42px;
  opacity: 0.18;
  animation: bgDrift 8s linear infinite;
}

.countdown {
  position: relative;
  z-index: 40;
  text-align: center;
  padding: 0 18px;
  animation: fadeIn 1s ease forwards;
}

.date {
  color: #fff35b;
  font-size: clamp(15px, 2.4vw, 34px);
  line-height: 1.55;
  margin: 0 0 26px;
  text-shadow: 3px 3px 0 #000;
}

.info {
  color: #777;
  font-size: clamp(9px, 1vw, 15px);
  line-height: 1.7;
  margin: 0 0 58px;
  text-shadow: 2px 2px 0 #000;
}

.timer {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #8e8e8e;
  font-size: clamp(22px, 4.6vw, 66px);
  line-height: 1;
  text-shadow: 4px 4px 0 #000;
}

.num {
  min-width: clamp(44px, 7vw, 96px);
  text-align: right;
}

.colon {
  width: clamp(16px, 3vw, 42px);
  text-align: center;
}

.flowers {
  position: absolute;
  top: -48px;
  width: min(47vw, 668px);
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  image-rendering: pixelated;
}

.flowers img {
  width: 100%;
  display: block;
  image-rendering: pixelated;
}

.flowers.left {
  left: 0;
  animation: flowersLeft 1.4s ease forwards;
  animation-delay: 1s;
}

.flowers.right {
  right: 0;
  animation: flowersRight 1.4s ease forwards;
  animation-delay: 1s;
}

.sparkle-layer {
  position: absolute;
  inset: 0;
  z-index: 28;
  pointer-events: none;
}

.sparkle {
  position: absolute;
  width: clamp(18px, 2.8vw, 44px);
  image-rendering: pixelated;
  opacity: 0;
  transform-origin: center;
}

@keyframes flowersLeft {
  from {
    opacity: 0;
    transform: translateX(-35%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes flowersRight {
  from {
    opacity: 0;
    transform: translateX(35%) scaleX(-1);
  }
  to {
    opacity: 1;
    transform: translateX(0) scaleX(-1);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes bgDrift {
  from {
    background-position: 0 0;
  }
  to {
    background-position: 42px 42px;
  }
}

@media (max-width: 700px) {
  .flowers {
    width: 70vw;
    top: -20px;
  }

  .info {
    margin-bottom: 36px;
  }

  .timer {
    font-size: 28px;
  }

  .num {
    min-width: 38px;
  }

  .colon {
    width: 14px;
  }
}
</style>
</head>

<body>
<main class="page">

  <div class="flowers left">
    <img src="https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/flowers.png" alt="">
  </div>

  <div class="flowers right">
    <img src="https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/flowers.png" alt="">
  </div>

  <div class="sparkle-layer" id="sparkles"></div>

  <section class="countdown">
    <h1 class="date">
      Releasing on<br>
      June 24, 2026
    </h1>

    <h2 class="info">
      * June 25 in Japan,<br>
      Australia, and New Zealand
    </h2>

    <div class="timer">
      <span class="num" id="days">00</span>
      <span class="colon">:</span>
      <span class="num" id="hours">00</span>
      <span class="colon">:</span>
      <span class="num" id="minutes">00</span>
      <span class="colon">:</span>
      <span class="num" id="seconds">00</span>
    </div>
  </section>

</main>

<script>
const RELEASE_TIME = new Date("2026-06-24T11:00:00-04:00").getTime();

const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

function pad(num) {
  return String(num).padStart(2, "0");
}

function updateCountdown() {
  const diff = RELEASE_TIME - Date.now();

  if (diff <= 0) {
    daysEl.textContent = "00";
    hoursEl.textContent = "00";
    minutesEl.textContent = "00";
    secondsEl.textContent = "00";
    document.querySelector(".date").innerHTML = "Chapter 5<br>Released";
    document.querySelector(".info").textContent = "* The countdown has ended.";
    return;
  }

  const total = Math.floor(diff / 1000);
  const days = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const minutes = Math.floor((total % 3600) / 60);
  const seconds = total % 60;

  daysEl.textContent = pad(days);
  hoursEl.textContent = pad(hours);
  minutesEl.textContent = pad(minutes);
  secondsEl.textContent = pad(seconds);
}

const sparkleFrames = [
  "https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/sparkle0.png",
  "https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/sparkle1.png",
  "https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/sparkle2.png",
  "https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/sparkle3.png",
  "https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/sparkle4.png",
  "https://raw.githubusercontent.com/aRandomPersonOnline3/deltarunestf/main/sparkle5.png"
];

function createSparkle(x, y, delay, size = 1) {
  const img = document.createElement("img");
  img.className = "sparkle";
  img.src = sparkleFrames[0];
  img.style.left = x;
  img.style.top = y;
  img.style.scale = size;
  document.getElementById("sparkles").appendChild(img);

  let frame = 0;
  let tick = 0;

  setTimeout(() => {
    setInterval(() => {
      tick++;

      frame = Math.floor(tick / 4) % sparkleFrames.length;
      img.src = sparkleFrames[frame];

      const phase = tick / 10;
      const floatY = Math.sin(phase) * 6;
      const floatX = Math.cos(phase * 0.7) * 3;

      img.style.opacity = frame === 0 ? "0" : "1";
      img.style.transform =
        `translate(${floatX}px, ${floatY}px) scale(${0.75 + frame * 0.08})`;
    }, 60);
  }, delay);
}

function makeSparkles() {
  const sparkles = [
    ["15%", "26%", 0, 1.1],
    ["26%", "14%", 280, 0.9],
    ["36%", "23%", 650, 1],
    ["55%", "17%", 130, 0.8],
    ["71%", "25%", 820, 1.05],
    ["84%", "15%", 380, 0.9],

    ["13%", "74%", 440, 1],
    ["25%", "86%", 100, 0.85],
    ["41%", "78%", 760, 1.15],
    ["58%", "86%", 310, 0.9],
    ["73%", "76%", 900, 1],
    ["88%", "83%", 520, 0.95]
  ];

  sparkles.forEach(s => createSparkle(s[1], s[0], s[2], s[3]));
}

updateCountdown();
setInterval(updateCountdown, 1000);
makeSparkles();
</script>
</body>
</html>
