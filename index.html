<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deltarune Chapter 5 Countdown</title>

  <style>
    @font-face {
      font-family: PixelFont;
      src: local("Courier New");
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: white;
      font-family: PixelFont, monospace;
      overflow: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background:
        radial-gradient(circle at center, rgba(80, 0, 120, 0.2), transparent 45%),
        linear-gradient(#050505, #000);
    }

    .countdown-box {
      position: relative;
      z-index: 30;
      text-align: center;
      animation: fadeIn 1s ease forwards;
    }

    .release-date {
      color: #ffff55;
      font-size: clamp(22px, 4vw, 46px);
      margin-bottom: 18px;
      text-shadow: 3px 3px #000;
    }

    .release-info {
      color: #9b9b9b;
      font-size: clamp(14px, 2vw, 22px);
      margin-bottom: 48px;
      text-shadow: 2px 2px #000;
    }

    .timer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(6px, 1.5vw, 18px);
      font-size: clamp(28px, 7vw, 82px);
      color: #bdbdbd;
      text-shadow: 4px 4px #000;
    }

    .time-part {
      min-width: clamp(42px, 10vw, 110px);
      text-align: right;
      color: #cfcfcf;
    }

    .colon {
      color: #9f9f9f;
      width: clamp(10px, 2vw, 28px);
      text-align: center;
    }

    .labels {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: clamp(18px, 4vw, 58px);
      color: #777;
      font-size: clamp(10px, 1.4vw, 15px);
    }

    .flower-side {
      position: absolute;
      top: -40px;
      width: min(36vw, 520px);
      height: 115vh;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      animation: slideIn 1.2s ease forwards;
      animation-delay: 0.7s;
    }

    .flower-side.left {
      left: 0;
      transform: translateX(-25%);
    }

    .flower-side.right {
      right: 0;
      transform: translateX(25%) scaleX(-1);
    }

    .vine {
      position: absolute;
      inset: 0;
    }

    .vine::before,
    .vine::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 120%;
      top: -5%;
      background:
        repeating-linear-gradient(
          to bottom,
          #256b2f 0 18px,
          #174b22 18px 28px
        );
      border: 3px solid #071807;
      image-rendering: pixelated;
    }

    .vine::before {
      left: 32%;
      transform: rotate(10deg);
    }

    .vine::after {
      left: 50%;
      transform: rotate(-8deg);
    }

    .flower {
      position: absolute;
      width: clamp(34px, 6vw, 78px);
      height: clamp(34px, 6vw, 78px);
      background: #ffdc35;
      border: 4px solid #111;
      clip-path: polygon(
        50% 0%,
        64% 28%,
        96% 20%,
        75% 50%,
        96% 80%,
        64% 72%,
        50% 100%,
        36% 72%,
        4% 80%,
        25% 50%,
        4% 20%,
        36% 28%
      );
      image-rendering: pixelated;
      animation: flowerBob 3s ease-in-out infinite;
    }

    .flower::after {
      content: "";
      position: absolute;
      inset: 36%;
      background: #111;
      border-radius: 50%;
    }

    .star {
      position: absolute;
      width: clamp(14px, 2.2vw, 32px);
      height: clamp(14px, 2.2vw, 32px);
      background: #ffffff;
      clip-path: polygon(
        50% 0%,
        62% 35%,
        100% 50%,
        62% 65%,
        50% 100%,
        38% 65%,
        0% 50%,
        38% 35%
      );
      animation: twinkle 1.6s infinite steps(2, end);
      filter: drop-shadow(0 0 8px #fff);
    }

    .footer {
      position: absolute;
      bottom: 24px;
      z-index: 35;
      color: #555;
      font-size: 13px;
      text-align: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0) scaleX(var(--flip, 1));
      }
    }

    .right {
      --flip: -1;
    }

    .left {
      --flip: 1;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.25;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    @keyframes flowerBob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @media (max-width: 700px) {
      .flower-side {
        width: 42vw;
        opacity: 0.65;
      }

      .labels {
        display: none;
      }

      .release-info {
        margin-bottom: 32px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="flower-side left">
      <div class="vine"></div>

      <div class="flower" style="top: 12%; left: 32%; animation-delay: -0.2s;"></div>
      <div class="flower" style="top: 27%; left: 48%; animation-delay: -1s;"></div>
      <div class="flower" style="top: 45%; left: 25%; animation-delay: -1.7s;"></div>
      <div class="flower" style="top: 63%; left: 52%; animation-delay: -0.8s;"></div>
      <div class="flower" style="top: 82%; left: 34%; animation-delay: -1.4s;"></div>

      <div class="star" style="top: 18%; left: 67%; animation-delay: -0.3s;"></div>
      <div class="star" style="top: 35%; left: 44%; animation-delay: -1.2s;"></div>
      <div class="star" style="top: 54%; left: 70%; animation-delay: -0.7s;"></div>
      <div class="star" style="top: 78%; left: 58%; animation-delay: -1.5s;"></div>
      <div class="star" style="top: 92%; left: 42%; animation-delay: -0.9s;"></div>
    </div>

    <section class="countdown-box">
      <h1 class="release-date">
        Releasing on<br />
        June 24, 2026
      </h1>

      <h2 class="release-info">
        * June 25 in Japan,<br />
        Australia, and New Zealand
      </h2>

      <div class="timer" aria-label="Countdown timer">
        <span class="time-part" id="days">00</span>
        <span class="colon">:</span>
        <span class="time-part" id="hours">00</span>
        <span class="colon">:</span>
        <span class="time-part" id="minutes">00</span>
        <span class="colon">:</span>
        <span class="time-part" id="seconds">00</span>
      </div>

      <div class="labels">
        <span>DAYS</span>
        <span>HOURS</span>
        <span>MINUTES</span>
        <span>SECONDS</span>
      </div>
    </section>

    <div class="flower-side right">
      <div class="vine"></div>

      <div class="flower" style="top: 10%; left: 36%; animation-delay: -1.1s;"></div>
      <div class="flower" style="top: 25%; left: 54%; animation-delay: -0.4s;"></div>
      <div class="flower" style="top: 42%; left: 30%; animation-delay: -1.5s;"></div>
      <div class="flower" style="top: 61%; left: 56%; animation-delay: -0.9s;"></div>
      <div class="flower" style="top: 84%; left: 39%; animation-delay: -1.8s;"></div>

      <div class="star" style="top: 15%; left: 70%; animation-delay: -0.6s;"></div>
      <div class="star" style="top: 31%; left: 48%; animation-delay: -1.4s;"></div>
      <div class="star" style="top: 50%; left: 74%; animation-delay: -0.2s;"></div>
      <div class="star" style="top: 71%; left: 61%; animation-delay: -1.1s;"></div>
      <div class="star" style="top: 95%; left: 43%; animation-delay: -0.8s;"></div>
    </div>

    <div class="footer">
      Fan-made countdown recreation
    </div>
  </main>

  <script>
    const releaseTime = new Date("2026-06-24T11:00:00-04:00").getTime();

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function updateCountdown() {
      const now = Date.now();
      let diff = releaseTime - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";

        document.querySelector(".release-date").innerHTML = "Chapter 5<br />Released";
        document.querySelector(".release-info").textContent = "* The countdown has ended.";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);

      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
